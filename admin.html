<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel | Christy Saly</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --rose:#f2a7b3;
  --blush:#fce4ec;
  --mauve:#c77d93;
  --deep:#7b3f5e;
  --cream:#fdf6f0;

  --bg: #f5e6ed;
  --surface: #fdf0f4;
  --outline: #e8a0b8;
  --text: #3a1f2b;
  --text-muted: #9a6070;
  --accent: #c05a7a;
  --accent-dark: #7b3f5e;
  --header-bg: #7b3f5e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* LOGIN */
#login-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.login-box {
  background: var(--surface);
  padding: 2.8rem 2.2rem;
  border-radius: 18px;
  text-align: center;
  width: 320px;
  border: 1.5px solid var(--outline);
  box-shadow: 0 8px 32px rgba(123,63,94,0.15);
}

.login-box h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--accent-dark);
  margin-bottom: 1.6rem;
  letter-spacing: 0.01em;
}

.login-box input {
  width: 100%;
  padding: 10px 14px;
  margin: 6px 0;
  border: 1.5px solid var(--outline);
  border-radius: 10px;
  font-family: 'Jost', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  background: #fff;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.login-box input::placeholder { color: #c090a0; }

.login-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(192,90,122,0.15);
}

.login-box button {
  margin-top: 14px;
  width: 100%;
  padding: 11px;
  background: var(--accent-dark);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Jost', sans-serif;
  font-size: 0.92rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: background 0.2s;
}

.login-box button:hover { background: var(--accent); }

#error {
  margin-top: 10px;
  font-size: 0.82rem;
  color: #c0395a;
  min-height: 1.2em;
}

/* ADMIN */
#admin-content { display: none; }

.admin-header {
  background: var(--header-bg);
  padding: 1.1rem 2rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  border-bottom: 2px solid var(--outline);
}

.admin-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 600;
  color: #fce4ec;
  letter-spacing: 0.02em;
}

.admin-header .dot {
  width: 8px; height: 8px;
  background: var(--outline);
  border-radius: 50%;
  margin-left: auto;
}

.admin-main {
  padding: 2rem;
  max-width: 820px;
  margin: 0 auto;
}

.toolbar {
  display: flex;
  align-items: center;
  margin-bottom: 1.5rem;
}

.toolbar h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 500;
  color: var(--accent-dark);
  flex: 1;
  letter-spacing: 0.02em;
}

.btn-refresh {
  padding: 7px 18px;
  background: var(--surface);
  border: 1.5px solid var(--outline);
  border-radius: 8px;
  color: var(--accent-dark);
  font-family: 'Jost', sans-serif;
  font-size: 0.83rem;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}

.btn-refresh:hover {
  background: #eec8d8;
  border-color: var(--accent);
}

/* Cards */
.card {
  background: var(--surface);
  padding: 1.3rem 1.5rem;
  margin: 0.75rem 0;
  border-radius: 14px;
  border: 1.5px solid var(--outline);
  transition: box-shadow 0.2s, border-color 0.2s;
}

.card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 18px rgba(123,63,94,0.12);
}

.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.08rem;
  font-weight: 600;
  color: var(--accent-dark);
}

.card-email {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 300;
  margin-top: 2px;
  margin-bottom: 0.8rem;
  letter-spacing: 0.02em;
}

.card-message {
  font-size: 0.88rem;
  color: #5a3a48;
  line-height: 1.6;
  margin-bottom: 1rem;
  font-weight: 300;
}

.card button {
  padding: 5px 14px;
  background: none;
  border: 1.5px solid var(--outline);
  border-radius: 7px;
  color: var(--text-muted);
  font-family: 'Jost', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.card button:hover {
  border-color: #c0395a;
  color: #c0395a;
}

.state-msg {
  text-align: center;
  padding: 2.5rem;
  color: var(--text-muted);
  font-size: 0.88rem;
  font-weight: 300;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <h3>🔐 Admin Login</h3>
    <input id="username" placeholder="Username" autocomplete="username">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-content">

  <header class="admin-header">
    <span>🌸</span>
    <h1>Christy Saly — Admin</h1>
    <div class="dot"></div>
  </header>

  <div class="admin-main">
    <div class="toolbar">
      <h2>Contact Messages</h2>
      <button class="btn-refresh" onclick="loadMessages()">🔄 Refresh</button>
    </div>
    <div id="messages"><p class="state-msg">Loading...</p></div>
  </div>

</div>

<script>
const BACKEND_URL = "https://christy-backend.onrender.com";

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (u === "christy" && p === "christy@123") {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("admin-content").style.display = "block";
    loadMessages();
  } else {
    document.getElementById("error").innerText = "Wrong credentials ❌";
  }
}

async function loadMessages() {
  const box = document.getElementById("messages");
  box.innerHTML = '<p class="state-msg">Loading...</p>';

  try {
    const res = await fetch(`${BACKEND_URL}/contacts`);
    const data = await res.json();

    box.innerHTML = "";

    data.forEach(m => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div class="card-name">${m.name}</div>
        <div class="card-email">${m.email}</div>
        <div class="card-message">${m.message}</div>
        <button onclick="deleteMsg(${m.id})">Delete</button>
      `;
      box.appendChild(div);
    });

  } catch {
    box.innerHTML = '<p class="state-msg">Error loading messages</p>';
  }
}

async function deleteMsg(id) {
  await fetch(`${BACKEND_URL}/contact/${id}`, { method: "DELETE" });
  loadMessages();
}
</script>

</body>
</html>
