<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel | Christy Saly</title>

<style>
/* 🔐 Hide everything until login */
#main-content { display: none; }

/* 🔐 Login Overlay */
#login-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.login-box {
  background: white;
  padding: 2rem;
  border-radius: 16px;
  text-align: center;
  width: 280px;
}
.login-box input {
  width: 100%;
  padding: 8px;
  margin: 8px 0;
}
.login-box button {
  padding: 8px 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <h3>🔐 Admin Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ✅ YOUR ORIGINAL PAGE (wrapped) -->
<div id="main-content">

<!-- KEEP YOUR FULL ORIGINAL CODE BELOW -->
<!-- I only added this wrapper div -->

<h1 style="text-align:center;margin-top:50px;">Admin Panel Loaded ✅</h1>

<!-- Your existing admin UI still works -->

</div>

<script>
// 🔐 LOGIN FUNCTION
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  if (user === "christy" && pass === "christy@123") {
    document.getElementById('login-overlay').style.display = "none";
    document.getElementById('main-content').style.display = "block";
  } else {
    document.getElementById('error').innerText = "Wrong username or password ❌";
  }
}
</script>

</body>
</html>
