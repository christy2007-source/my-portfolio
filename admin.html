<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel | Christy Saly</title>

<style>
:root {
  --rose:#f2a7b3;
  --blush:#fce4ec;
  --mauve:#c77d93;
  --deep:#7b3f5e;
  --cream:#fdf6f0;
}

/* 🔐 LOGIN */
#login-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.login-box {
  background:white;
  padding:2rem;
  border-radius:16px;
  text-align:center;
  width:300px;
}
.login-box input {
  width:100%;
  padding:10px;
  margin:10px 0;
}
.login-box button {
  padding:10px;
  cursor:pointer;
}

/* hide admin */
#admin-content { display:none; }

body {
  font-family:sans-serif;
  background:var(--cream);
}

/* simple admin layout (your original style simplified) */
.admin-main {
  padding:2rem;
}
.card {
  background:white;
  padding:1rem;
  margin:1rem 0;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <h3>🔐 Admin Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ✅ ADMIN -->
<div id="admin-content">

<h1>🌸 Admin Dashboard</h1>

<div class="admin-main">
  <button onclick="loadMessages()">🔄 Refresh</button>

  <div id="messages"></div>
</div>

</div>

<script>
const BACKEND_URL = "https://christy-backend.onrender.com";

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (u === "christy" && p === "christy@123") {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("admin-content").style.display = "block";
    loadMessages();
  } else {
    document.getElementById("error").innerText = "Wrong credentials ❌";
  }
}

async function loadMessages() {
  const box = document.getElementById("messages");
  box.innerHTML = "Loading...";

  try {
    const res = await fetch(`${BACKEND_URL}/contacts`);
    const data = await res.json();

    box.innerHTML = "";

    data.forEach(m => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <b>${m.name}</b> (${m.email})<br>
        ${m.message}<br>
        <button onclick="deleteMsg(${m.id})">Delete</button>
      `;
      box.appendChild(div);
    });

  } catch {
    box.innerHTML = "Error loading messages";
  }
}

async function deleteMsg(id) {
  await fetch(`${BACKEND_URL}/contact/${id}`, { method: "DELETE" });
  loadMessages();
}
</script>

</body>
</html>
